<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer hexagon -->
  <path d="M60 10 L105 32 L105 88 L60 110 L15 88 L15 32 Z" stroke="url(#logoGrad)" stroke-width="4" fill="none"/>

