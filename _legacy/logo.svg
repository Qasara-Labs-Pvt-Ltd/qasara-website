  <!-- Center node -->
  <circle cx="60" cy="60" r="10" fill="url(#logoGrad)"/>

  <!-- Connection lines from center to inner hex vertices -->
  <line x1="60" y1="50" x2="60" y2="28" stroke="#00d4aa" stroke-width="2" opacity="0.5"/>
  <line x1="68.66" y1="55" x2="88" y2="44" stroke="#00d4aa" stroke-width="2" opacity="0.5"/>
  <line x1="68.66" y1="65" x2="88" y2="76" stroke="#00d4aa" stroke-width="2" opacity="0.5"/>
  <line x1="60" y1="70" x2="60" y2="92" stroke="#00d4aa" stroke-width="2" opacity="0.5"/>
  <line x1="51.34" y1="65" x2="32" y2="76" stroke="#00d4aa" stroke-width="2" opacity="0.5"/>
  <line x1="51.34" y1="55" x2="32" y2="44" stroke="#00d4aa" stroke-width="2" opacity="0.5"/>

  <!-- Vertex dots on inner hexagon -->
  <circle cx="60" cy="28" r="3" fill="#00d4aa" opacity="0.6"/>
  <circle cx="88" cy="44" r="3" fill="#00d4aa" opacity="0.6"/>
  <circle cx="88" cy="76" r="3" fill="#00d4aa" opacity="0.6"/>
  <circle cx="60" cy="92" r="3" fill="#00d4aa" opacity="0.6"/>
  <circle cx="32" cy="76" r="3" fill="#00d4aa" opacity="0.6"/>
  <circle cx="32" cy="44" r="3" fill="#00d4aa" opacity="0.6"/>

  <defs>
    <linearGradient id="logoGrad" x1="15" y1="10" x2="105" y2="110">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
